name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract changelog for tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk -v tag="$TAG" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" tag "\\]") found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog section for v${TAG}" > release_notes.md
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Export STAC catalog
        run: |
          pip install -e .
          python scripts/export_stac_catalog.py --output results/stac/catalog.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: true
          files: |
            results/stac/catalog.json
            CITATION.cff
