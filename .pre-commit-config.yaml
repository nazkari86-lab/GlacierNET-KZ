repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix, --select, E,F,W,I, --ignore, E501]
        files: ^(src/|glacierkz-api/app/)
      - id: ruff-format
        files: ^(src/|glacierkz-api/app/)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=10240]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: pytest-quick
        name: pytest (unit, no experimental)
        entry: python -m pytest tests/ glacierkz-api/tests/ -q -m "not experimental" --tb=no
        language: system
        pass_filenames: false
        always_run: true
