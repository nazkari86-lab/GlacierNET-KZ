# GlacierNET-KZ — unified stack
# One URL: http://localhost:8080
#
#   /         Dashboard (Next.js)
#   /demo     Gradio upload demo
#   /docs     API Swagger
#   /api/*    REST endpoints
#   /mcp/*    MCP tools bridge
#   /legacy   Classic API UI (static)

services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped
    networks:
      - glaciernet

  api:
    build:
      context: .
      dockerfile: glacierkz-api/Dockerfile.full
    expose:
      - "8000"
    env_file:
      - ./glacierkz-api/.env
    environment:
      - DATA_DIR=/app/data
      - CORE_DIR=/app
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - uploads_data:/app/data/uploads
      - results_data:/app/data/results
      - ./models:/app/models:ro
      - ./results:/app/results:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped
    networks:
      - glaciernet

  web:
    build:
      context: ./glacierkz-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=
        - NEXT_PUBLIC_SITE_URL=http://localhost:8080
    expose:
      - "3000"
    environment:
      - API_INTERNAL_URL=http://api:8000
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_SITE_URL=http://localhost:8080
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - glaciernet

  demo:
    build:
      context: .
      dockerfile: spaces/Dockerfile
    expose:
      - "7860"
    environment:
      - GRADIO_ROOT_PATH=/demo
      - DEMO_PORT=7860
    volumes:
      - ./models:/app/models:ro
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped
    networks:
      - glaciernet

  gateway:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - web
      - demo
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - glaciernet

volumes:
  redis_data:
    driver: local
  uploads_data:
    driver: local
  results_data:
    driver: local

networks:
  glaciernet:
    driver: bridge
