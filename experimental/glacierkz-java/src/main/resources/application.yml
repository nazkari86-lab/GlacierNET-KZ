spring:
  application:
    name: glacierkz-java
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/glacierkz
    username: ${DB_USERNAME:glacier_user}
    password: ${DB_PASSWORD:glacier_pass}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      pool-name: GlacierKZPool
      register-metrics: true
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.spatial.dialect.postgis.PostgreSQLGISDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        generate_statistics: false
        jdbc:
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true
        dialect: org.hibernate.spatial.dialect.postgis.PostgreSQLGISDialect

  batch:
    jdbc:
      initialize-schema: always
      table-prefix: BATCH_
    job:
      enabled: true
    concurrency:
      max-threads: 8
    chunk-size: 100

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        max.block.ms: 5000
        linger.ms: 10
        batch.size: 16384
        buffer.memory: 33554432
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: glacierkz-processor
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: kz.glacier.kafka
        max.poll.records: 500
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
    listener:
      ack-mode: manual-immediate
      concurrency: 4

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=5000,expireAfterWrite=30m,recordStats
    cache-names:
      - glacier-geometries
      - job-status
      - user-sessions
      - raster-metadata
      - report-cache

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@glacier.kz}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 1GB

server:
  port: 8080
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    max-connections: 10000
    accept-count: 200
    connection-timeout: 20000
    mbeanregistry:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,batch,env,loggers
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        glacier.processing.duration: true
      percentiles:
        http.server.requests: 0.5,0.75,0.95,0.99
    tags:
      application: glacierkz

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
  packages-to-scan: kz.glacier.controller

jwt:
  secret: ${JWT_SECRET:2d4f6a8b1c3e5f7a9b2d4e6f8a1c3b5d7e9f2a4b6c8d1e3f5a7b9c2d4e6f8a1b}
  expiration: 86400000
  refresh-expiration: 604800000
  header: Authorization
  prefix: "Bearer "

geoserver:
  url: ${GEOSERVER_URL:http://localhost:8080/geoserver}
  username: ${GEOSERVER_USERNAME:admin}
  password: ${GEOSERVER_PASSWORD:geoserver}
  workspace: ${GEOSERVER_WORKSPACE:glacierkz}
  timeout: 30000

notifications:
  enabled: true
  smtp-from: noreply@glacier.kz
  admin-emails: admin@glacier.kz

glacier:
  batch:
    chunk-size: 100
    thread-count: 8
    max-retries: 3
  processing:
    temp-directory: /tmp/glacierkz
    max-concurrent-jobs: 10
    raster-format: GEOTIFF
    default-crs: EPSG:4326
  spatial:
    default-buffer-meters: 1000
    max-polygon-vertices: 10000

logging:
  level:
    root: INFO
    kz.glacier: DEBUG
    org.springframework.batch: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/glacierkz.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/glacierkz_dev
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  batch:
    job:
      enabled: false

  kafka:
    bootstrap-servers: localhost:9092

  h2:
    console:
      enabled: false

logging:
  level:
    kz.glacier: DEBUG
    org.springframework.batch: INFO

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:glacierkz-db}:${DB_PORT:5432}/${DB_NAME:glacierkz}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:kafka-0:9092,kafka-1:9092,kafka-2:9092}
    producer:
      acks: all
      retries: 5
    consumer:
      group-id: glacierkz-processor-prod

  batch:
    job:
      enabled: true

  mail:
    host: ${MAIL_HOST}

logging:
  level:
    kz.glacier: INFO
    org.springframework.batch: WARN
    org.springframework.kafka: WARN
